openapi: 3.0.0
info:
  title: Task API
  version: 1.0.0

paths:
  /api/tasks:
    get:
      summary: Get all tasks
      responses:
        "200":
          description: OK

    post:
      summary: Create task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                priority:
                  type: string
      responses:
        "201":
          description: Created
